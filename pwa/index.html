<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0D7377" />
  <meta name="description" content="Track sustainable habits, grow your virtual companion tree, and reduce your carbon footprint." />

  <!-- PWA / Apple -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Marble" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Open Graph -->
  <meta property="og:title" content="Marble Companion" />
  <meta property="og:description" content="Eco-habit tracking with a virtual companion tree" />
  <meta property="og:type" content="website" />

  <title>Marble Companion</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/app.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"
          integrity="sha384-OLBgp1GsljhM2TJ+sbHjaiH9txEUvgdDTAzHv2P24donTt6/529l+9Ua0vFImLlb"
          crossorigin="anonymous"></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="app">
    <!-- Page Content -->
    <div id="page-container">
      <div id="page-content"></div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="hidden">
      <button class="nav-tab" data-route="home" aria-label="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
        <span>Home</span>
      </button>
      <button class="nav-tab" data-route="dashboard" aria-label="Dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span>Stats</span>
      </button>
      <button class="nav-tab" data-route="habits" aria-label="Habits">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
        <span>Habits</span>
      </button>
      <button class="nav-tab" data-route="social" aria-label="Social">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
        </svg>
        <span>Social</span>
      </button>
      <button class="nav-tab" data-route="profile" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Profile</span>
      </button>
    </nav>

    <!-- Toast Notifications -->
    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="hidden">
      <div class="spinner"></div>
    </div>
  </div>

  <!--
    App Configuration
    Set these values before deploying. They can be injected by your build pipeline
    or replaced at runtime by a server-side template.
  -->
  <script>
    // Google OAuth 2.0 Client ID — create one at https://console.cloud.google.com/
    window.GOOGLE_CLIENT_ID = '';

    // API base URL — leave empty for same-origin, or set to your API server URL
    // e.g. 'https://api.marblecompanion.com'
    window.API_BASE_URL = '';
  </script>

  <!-- App Modules -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
